<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aGi | Claims AI Pipeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .loader { border-top-color: transparent; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        body { transition: background-color 0.3s ease, color 0.3s ease; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-50 p-6 md:p-10 flex flex-col items-center">

    <div class="w-full max-w-5xl flex justify-between items-center mb-10 border-b border-slate-300 dark:border-slate-700 pb-4">
        <div>
            <h1 class="text-3xl font-bold tracking-tight">Claims<span class="text-blue-600 dark:text-blue-500">AI</span> Pipeline</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Local RAG Environment • Demo Mode</p>
        </div>
        <div class="flex items-center gap-4">
            <span class="bg-amber-100 text-amber-700 dark:bg-amber-500/10 dark:text-amber-400 px-3 py-1 rounded-full text-xs font-semibold border border-amber-200 dark:border-amber-500/20 flex items-center gap-1">
                <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                Mock Data Active
            </span>
            <button onclick="toggleTheme()" class="p-2 rounded-lg bg-slate-200 hover:bg-slate-300 dark:bg-slate-800 dark:hover:bg-slate-700 transition-colors shadow-sm text-lg">
                <span id="themeIcon">☀️</span>
            </button>
        </div>
    </div>

    <div class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="flex flex-col gap-6">
            
            <div class="bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700 shadow-lg">
                <h2 class="text-xl font-semibold mb-4 text-slate-800 dark:text-slate-200">1. Update Vector DB</h2>
                <div class="flex gap-2">
                    <input type="text" id="filenameInput" placeholder="e.g., site_investigation_001.pdf" value="site_investigation_001.pdf" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    <button onclick="ingestDocument()" id="ingestBtn" class="bg-slate-800 hover:bg-slate-700 dark:bg-slate-700 dark:hover:bg-slate-600 text-white font-semibold px-4 py-2 rounded-lg transition-all whitespace-nowrap">
                        Ingest PDF
                    </button>
                </div>
                <p id="ingestStatus" class="text-xs mt-2 font-medium h-4"></p>
            </div>

            <div class="bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700 shadow-lg">
                <h2 class="text-xl font-semibold mb-4 text-slate-800 dark:text-slate-200">2. Extraction Query</h2>
                <textarea id="queryInput" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none mb-4 transition-all" rows="4">Extract the main causes of property damage and summarize the recommended repairs.</textarea>
                
                <button id="generateBtn" onclick="runPipeline()" class="w-full bg-blue-600 hover:bg-blue-700 dark:hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-all shadow-md flex justify-center items-center gap-2">
                    Generate Technical Report
                </button>
            </div>
        </div>

        <div class="bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700 shadow-lg flex flex-col h-full min-h-[400px]">
            <h2 class="text-xl font-semibold mb-4 text-slate-800 dark:text-slate-200">3. Final Output</h2>
            
            <div id="loadingState" class="hidden flex-col items-center justify-center flex-1 py-10">
                <div class="loader rounded-full border-4 border-slate-200 border-l-blue-600 dark:border-slate-600 dark:border-l-blue-500 h-12 w-12 mb-4"></div>
                <p class="text-sm text-slate-600 dark:text-slate-400 font-medium tracking-wide">Querying Local Vector DB...</p>
                <p class="text-xs text-slate-400 dark:text-slate-500 mt-2">Generating via Llama 3 (Mock)</p>
            </div>

            <div id="resultState" class="hidden flex-1">
                <div id="reportOutput" class="bg-slate-50 dark:bg-slate-900 p-6 rounded-lg border border-slate-200 dark:border-slate-600 text-sm h-full whitespace-pre-wrap font-mono overflow-y-auto leading-relaxed shadow-inner"></div>
            </div>

            <div id="initialState" class="flex-1 flex items-center justify-center border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-lg p-6 transition-colors">
                <p class="text-slate-500 text-sm text-center font-medium tracking-wide">Awaiting extraction trigger...</p>
            </div>
        </div>
    </div>

    <script>
        // --- Theme Switcher Logic ---
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.innerText = '🌙';
            } else {
                html.classList.add('dark');
                icon.innerText = '☀️';
            }
        }

        // --- Mock Ingestion Logic ---
        async function ingestDocument() {
            const filename = document.getElementById('filenameInput').value;
            const statusText = document.getElementById('ingestStatus');
            const btn = document.getElementById('ingestBtn');
            
            if(!filename) { 
                statusText.innerText = "❌ Please enter a filename."; 
                statusText.className = "text-xs mt-2 font-medium h-4 text-red-500";
                return; 
            }

            // UI Loading State
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-wait');
            statusText.innerText = "🔄 Slicing and Vectorizing chunks...";
            statusText.className = "text-xs mt-2 font-medium h-4 text-blue-500 animate-pulse";

            // Simulate 1.5 seconds of "Server Processing"
            await new Promise(resolve => setTimeout(resolve, 1500));

            // Success State
            statusText.innerText = `✅ Document '${filename}' successfully vectorized and stored locally.`;
            statusText.className = "text-xs mt-2 font-medium h-4 text-emerald-600 dark:text-emerald-400";
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-wait');
        }

        // --- Mock Generation Logic ---
        async function runPipeline() {
            const btn = document.getElementById('generateBtn');
            const filename = document.getElementById('filenameInput').value;
            
            // Check if file is "ingested" first
            if(!filename) {
                alert("Please ingest a document first.");
                return;
            }

            // UI Loading States
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-wait');
            document.getElementById('initialState').classList.add('hidden');
            document.getElementById('resultState').classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('loadingState').classList.add('flex');

            // Simulate 2.5 seconds of "LLM Generation"
            await new Promise(resolve => setTimeout(resolve, 2500));

            // Realistic Mock Markdown Report
            const mockReport = `## Technical Investigation Summary
*Source: ${filename}*

### 1. Primary Cause of Damage
The site investigation and historical data indicate that the primary cause of damage was **severe water ingress** through compromised flashing on the eastern roof elevation, exacerbated by subsequent structural loading.

### 2. Secondary Observations
* Structural degradation noted in the drywall (Zone A).
* Moisture mapping indicates early-stage mold proliferation detected in the sub-flooring.
* Load-bearing joists show 15% deterioration.

### 3. Recommended Repairs
* **Immediate:** Complete extraction and replacement of affected drywall in Zone A.
* **Structural:** Replacement of 15 linear feet of eastern roof flashing and reinforcement of compromised joists.
* **Preventative:** Application of antimicrobial treatment to sub-flooring prior to the installation of new underlayment.

---
*Generated by aGi Engine | Local Llama-3 Check | Confidence: 94%*`;

            // Display Results
            document.getElementById('reportOutput').innerHTML = mockReport;
            
            // UI Reset
            document.getElementById('loadingState').classList.remove('flex');
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('resultState').classList.remove('hidden');
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-wait');
        }
    </script>
</body>
</html>
